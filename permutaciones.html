<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVERSIONES DE ACORDES</title>
<script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; overflow-x: hidden; padding: 20px; }
.container { text-align: center; max-width: 900px; width: 100%; }
h1 { font-size: 2rem; margin-bottom: 0.5rem; background: linear-gradient(45deg, #e94560, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { color: #a0a0a0; margin-bottom: 1.5rem; font-size: 0.95rem; }
.selectors { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
.selector-group { display: flex; flex-direction: column; gap: 0.3rem; text-align: left; }
.selector-group label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
select { padding: 0.7rem 1rem; border-radius: 8px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; font-size: 0.95rem; cursor: pointer; outline: none; min-width: 200px; }
select:hover { border-color: #e94560; }
select option { background: #1a1a2e; color: white; }
.config-badge { display: inline-block; background: linear-gradient(45deg, #4ecdc4, #44a08d); padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; margin-bottom: 0.5rem; margin-right: 0.5rem; }
.permutation-counter { display: inline-block; background: rgba(255,255,255,0.1); padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; color: #ccc; }
.permutation-counter .used { color: #4ecdc4; font-weight: bold; }
.sequence-display { display: flex; gap: 1rem; justify-content: center; margin: 1.5rem 0; min-height: 100px; align-items: center; flex-wrap: wrap; }
.number-card { width: 80px; height: 110px; background: linear-gradient(145deg, #2a2a4a, #1a1a3a); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; box-shadow: 0 8px 25px rgba(0,0,0,0.4); border: 2px solid transparent; transition: all 0.3s ease; position: relative; }
.number-card.bass { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); background: linear-gradient(145deg, #3a3a5a, #2a2a4a); }
.number-card.playing { animation: pulse 0.5s ease; background: #e94560; transform: scale(1.05); }
@keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.1)} }
.note-label { font-size: 0.7rem; color: #aaa; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.controls { margin-top: 1.5rem; display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
button { background: linear-gradient(45deg, #e94560, #ff6b6b); border: none; color: white; padding: 0.9rem 2rem; font-size: 1rem; border-radius: 25px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); font-weight: bold; }
button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6); }
button:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
button.reset { background: linear-gradient(45deg, #4ecdc4, #44a08d); }
.countdown { font-size: 3.5rem; font-weight: bold; color: #e94560; margin: 0.5rem 0; min-height: 60px; opacity: 0; }
.countdown.show { opacity: 1; animation: beat 1s infinite; }
@keyframes beat { 0%,100%{transform:scale(1)}50%{transform:scale(1.1)} }
.status { margin-top: 1rem; font-size: 0.95rem; color: #aaa; min-height: 24px; }
.legend { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 12px; font-size: 0.8rem; }
.legend-item { display: flex; align-items: center; gap: 0.4rem; color: #ccc; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.history-box { margin-top: 1rem; padding: 0.8rem; background: rgba(0,0,0,0.2); border-radius: 8px; max-width: 500px; margin-left: auto; margin-right: auto; font-size: 0.8rem; display: none; }
.history-box.show { display: block; }
.history-title { color: #888; margin-bottom: 0.5rem; font-size: 0.75rem; text-transform: uppercase; }
.history-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
.history-tag { background: rgba(233, 69, 96, 0.2); padding: 0.2rem 0.6rem; border-radius: 12px; border: 1px solid rgba(233, 69, 96, 0.3); color: #ccc; font-size: 0.75rem; }
.history-tag.active { background: rgba(78, 205, 196, 0.3); border-color: #4ecdc4; color: white; }
</style>
</head>
<body>
<div class="container">
<h1>INVERSIONES DE ACORDES</h1>
<p class="subtitle">Selecciona el acorde y la inversión para practicar</p>
<div class="selectors">
<div class="selector-group">
<label>Tipo de Acorde</label>
<select id="chordType" onchange="changeConfig()">
<option value="mayor">Mayor (1-3-5-8)</option>
<option value="menor">Menor (1-b3-5-8)</option>
<option value="septima">7ma menor (1-3-5-b7)</option>
</select>
</div>
<div class="selector-group">
<label>Inversión (Bajo)</label>
<select id="inversionType" onchange="changeConfig()">
<option value="fundamental">Fundamental (1)</option>
<option value="primera">Primera (3ra)</option>
<option value="segunda">Segunda (5ta)</option>
</select>
</div>
</div>
<div>
<span class="config-badge" id="configBadge">Mayor - Fundamental</span>
<span class="permutation-counter"><span class="used" id="usedCount">0</span>/6</span>
</div>
<div class="sequence-display" id="display"></div>
<div class="countdown" id="countdown"></div>
<div class="controls">
<button id="playBtn" onclick="play()">Generar y Reproducir</button>
<button class="reset" onclick="resetAll()" style="display:none" id="resetBtn">Reiniciar</button>
</div>
<div class="status" id="status">Presiona el botón para comenzar</div>
<div class="history-box" id="historyBox">
<div class="history-title">Historial</div>
<div class="history-tags" id="historyTags"></div>
</div>
<div class="legend" id="legend"></div>
</div>
<script>
// Configuración de acordes
const CHORDS = {
mayor: {
name: 'Mayor',
notes: [
{ num: '1', note: 'C4', name: 'Do', color: '#ff6b6b' },
{ num: '3', note: 'E4', name: 'Mi', color: '#4ecdc4' },
{ num: '5', note: 'G4', name: 'Sol', color: '#ffe66d' },
{ num: '8', note: 'C5', name: 'Do', color: '#a8e6cf' }
]
},
menor: {
name: 'Menor',
notes: [
{ num: '1', note: 'C4', name: 'Do', color: '#ff6b6b' },
{ num: 'b3', note: 'D#4', name: 'Mib', color: '#4ecdc4' },
{ num: '5', note: 'G4', name: 'Sol', color: '#ffe66d' },
{ num: '8', note: 'C5', name: 'Do', color: '#a8e6cf' }
]
},
septima: {
name: '7ma menor',
notes: [
{ num: '1', note: 'C4', name: 'Do', color: '#ff6b6b' },
{ num: '3', note: 'E4', name: 'Mi', color: '#4ecdc4' },
{ num: '5', note: 'G4', name: 'Sol', color: '#ffe66d' },
{ num: 'b7', note: 'A#4', name: 'Sib', color: '#a8e6cf' }
]
}
};

let synth = null;
let currentChord = 'mayor';
let currentInv = 'fundamental';
let permutations = [];
let used = [];
let isPlaying = false;

// Inicializar sintetizador (usamos PolySynth para poder tocar varias notas)
async function initAudio() {
if (synth) return;
await Tone.start();
synth = new Tone.PolySynth(Tone.Synth, {
oscillator: { type: "triangle" },
envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 1 }
}).toDestination();
synth.volume.value = -5;
}

// Generar todas las permutaciones de un array
function getPermutations(arr) {
if (arr.length <= 1) return [arr];
const perms = [];
for (let i = 0; i < arr.length; i++) {
const rest = arr.slice(0, i).concat(arr.slice(i + 1));
const restPerms = getPermutations(rest);
for (const p of restPerms) {
perms.push([arr[i]].concat(p));
}
}
return perms;
}

function changeConfig() {
currentChord = document.getElementById('chordType').value;
currentInv = document.getElementById('inversionType').value;
const chordName = CHORDS[currentChord].name;
const invName = document.querySelector('#inversionType option:checked').text.split('(')[0].trim();
document.getElementById('configBadge').textContent = chordName + ' - ' + invName;
resetPermutations();
updateLegend();
}

function getCurrentNotes() {
const chord = CHORDS[currentChord].notes;
let bassIndex = 0; // fundamental
if (currentInv === 'primera') bassIndex = 1;
if (currentInv === 'segunda') bassIndex = 2;
const bass = chord[bassIndex];
const others = chord.filter((_, i) => i !== bassIndex);
return { bass, others, all: chord };
}

function resetPermutations() {
const { others } = getCurrentNotes();
// Generar las 6 permutaciones posibles de las 3 notas superiores
permutations = getPermutations([0, 1, 2]).map(indices => indices.map(i => others[i]));
used = [];
document.getElementById('usedCount').textContent = '0';
document.getElementById('resetBtn').style.display = 'none';
document.getElementById('playBtn').disabled = false;
document.getElementById('playBtn').textContent = 'Generar y Reproducir';
document.getElementById('status').textContent = 'Listo - quedan 6 permutaciones';
document.getElementById('historyBox').classList.remove('show');
document.getElementById('historyTags').innerHTML = '';
showStaticCards();
}

function showStaticCards() {
const { bass, others } = getCurrentNotes();
const display = document.getElementById('display');
display.innerHTML = '';
// Mostrar bajo primero
createCard(bass, true, 0);
// Mostrar las demás en orden
others.forEach((note, i) => createCard(note, false, i + 1));
}

function createCard(note, isBass, index) {
const div = document.createElement('div');
div.className = 'number-card' + (isBass ? ' bass' : '');
div.id = 'card' + index;
div.innerHTML = '<div>' + note.num + '</div><div class="note-label">' + note.name + '</div>';
div.style.borderColor = note.color;
document.getElementById('display').appendChild(div);
}

async function play() {
if (isPlaying) return;
if (permutations.length === 0) {
document.getElementById('status').textContent = 'Todas las permutaciones usadas. Presiona Reiniciar.';
document.getElementById('resetBtn').style.display = 'inline-block';
return;
}

isPlaying = true;
document.getElementById('playBtn').disabled = true;
await initAudio();

// Seleccionar permutación aleatoria
const rand = Math.floor(Math.random() * permutations.length);
const perm = permutations.splice(rand, 1)[0];
const { bass } = getCurrentNotes();
const sequence = [bass, ...perm];
used.push(sequence.map(n => n.num).join('-'));

// Mostrar
document.getElementById('display').innerHTML = '';
sequence.forEach((note, i) => createCard(note, i === 0, i));

// Contador visual
const cd = document.getElementById('countdown');
cd.classList.add('show');
for (let i = 4; i > 0; i--) {
cd.textContent = i;
document.getElementById('status').textContent = 'Esperando... ' + i;
await new Promise(r => setTimeout(r, 1000));
}
cd.classList.remove('show');
cd.textContent = '';

// Reproducir
document.getElementById('status').textContent = 'Reproduciendo...';
const now = Tone.now();
for (let i = 0; i < sequence.length; i++) {
const note = sequence[i];
synth.triggerAttackRelease(note.note, "8n", now + i * 0.6);
// Animar
setTimeout(() => {
const card = document.getElementById('card' + i);
if (card) {
card.classList.add('playing');
setTimeout(() => card.classList.remove('playing'), 500);
}
}, i * 600);
}

// Actualizar estado
document.getElementById('usedCount').textContent = used.length;
updateHistory();

setTimeout(() => {
isPlaying = false;
if (permutations.length > 0) {
document.getElementById('playBtn').disabled = false;
document.getElementById('status').textContent = 'Completado. Quedan ' + permutations.length + ' permutaciones.';
} else {
document.getElementById('status').textContent = 'Todas las permutaciones agotadas.';
document.getElementById('resetBtn').style.display = 'inline-block';
}
}, sequence.length * 600 + 500);
}

function updateHistory() {
const box = document.getElementById('historyBox');
const tags = document.getElementById('historyTags');
box.classList.add('show');
tags.innerHTML = '';
used.forEach((seq, idx) => {
const tag = document.createElement('span');
tag.className = 'history-tag' + (idx === used.length - 1 ? ' active' : '');
tag.textContent = seq;
tags.appendChild(tag);
});
}

function updateLegend() {
const { all } = getCurrentNotes();
const leg = document.getElementById('legend');
leg.innerHTML = '';
all.forEach(n => {
const item = document.createElement('div');
item.className = 'legend-item';
item.innerHTML = '<div class="legend-dot" style="background:' + n.color + '"></div><span>' + n.num + '=' + n.name + ' (' + n.note + ')</span>';
leg.appendChild(item);
});
}

function resetAll() {
resetPermutations();
document.getElementById('status').textContent = 'Reiniciado. Listo para generar.';
}

// Inicializar
changeConfig();
</script>
</body>
</html>
